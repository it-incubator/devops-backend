name: Notify

on:
  workflow_call:
    inputs:
      checks_result:
        required: true
        type: string
      deploy_result:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true


jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        run: |
          CHECKS="${{ inputs.checks_result }}"
          DEPLOY="${{ inputs.checks_result }}"

          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Тесты упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Деплой упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else 
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"
